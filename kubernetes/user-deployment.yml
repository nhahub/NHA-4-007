apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: user
  name: user
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user
  strategy:
   type: RollingUpdate
   rollingUpdate:
     maxUnavailable: 1
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
      - image: rahmaahmed2002/depi_gp-user-service:v1
        name: user-service
        ports:
        - containerPort: 3001
        env:
        - name: MONGO_URI
          value: mongodb://mongodb:27017/user_db
        - name: REDIS_URL
          value: redis://127.0.0.1:6379
        - name: ACCESS_TOKEN
          value: prod_secret
        
