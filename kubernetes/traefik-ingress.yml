---

# Strip prefix /api/user
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: user-mw
spec:
  stripPrefix:
    prefixes:
      - /api/user

---

# Strip prefix /api/product
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: product-mw
spec:
  stripPrefix:
    prefixes:
      - /api/product

---

# Strip prefix /api/cart
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cart-mw
spec:
  stripPrefix:
    prefixes:
      - /api/cart