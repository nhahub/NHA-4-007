---

# route for cart service
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cart-route
spec:
  entryPoints:
    - web # port 80
  routes:
  - kind: Rule
    # Rule on the Host
    match: PathPrefix(`/api/cart`)
    # Attach a middleware
    middlewares:
    - name: cart-mw
    # Set a priority
    priority: 10
    services:
    # Target a Kubernetes Service
    - kind: Service
